title: Multirotor Drone MDO
input_file: ../../workdir/problem_inputs.xml
output_file: ../../workdir/problem_outputs.xml
driver: om.ScipyOptimizeDriver(tol=1e-9, optimizer='SLSQP')
model:
  scenarios:
    id: fastuav.scenarios.multirotor
  propulsion:
    id: fastuav.propulsion.multirotor
    gearbox: false
  geometry:
    id: fastuav.geometry.multirotor
  structures:
    id: fastuav.structures.multirotor
  wires:
    id: fastuav.propulsion.wires.multirotor
  mtow:
    id: fastuav.mtow.multirotor
  performance:
    endurance:
      id: fastuav.performance.endurance.multirotor
    missions:
      id: fastuav.performance.mission
      file_path: ../missions/missions_multirotor.yaml
optimization:
  design_variables:
  - name: optimization:variables:weight:mtow:k
    upper: 40.0
    lower: 1.0
  - name: optimization:variables:propulsion:multirotor:propeller:ND:k
    lower: 0.01
    upper: 1.0
  - name: optimization:variables:propulsion:multirotor:propeller:beta
    lower: 0.3
    upper: 0.6
  - name: optimization:variables:propulsion:multirotor:propeller:advance_ratio:climb
    lower: 0.01
    upper: 0.5
  - name: optimization:variables:propulsion:multirotor:propeller:advance_ratio:cruise
    lower: 0.01
    upper: 2.0
  - name: optimization:variables:propulsion:multirotor:motor:torque:k
    lower: 1.0
    upper: 20.0
  - name: optimization:variables:propulsion:multirotor:motor:speed:k
    lower: 0.1
    upper: 10.0
  - name: optimization:variables:propulsion:multirotor:battery:energy:k
    lower: 0.1
    upper: 20.0
  - name: optimization:variables:propulsion:multirotor:battery:voltage:k
    lower: 1.0
    upper: 10.0
  - name: optimization:variables:propulsion:multirotor:esc:power:k
    lower: 1.0
    upper: 15.0
  - name: optimization:variables:propulsion:multirotor:esc:voltage:k
    lower: 1.0
    upper: 15.0
  - name: optimization:variables:structures:arms:diameter:k
    lower: 0.05
    upper: 0.99
  constraints:
  - name: optimization:constraints:weight:mtow:consistency
    lower: 0.0
  - name: optimization:constraints:weight:mtow:requirement
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:propeller:airspeed:climb
    lower: 0.0
    upper: 0.01
  - name: optimization:constraints:propulsion:multirotor:propeller:airspeed:cruise
    lower: 0.0
    upper: 0.01
  - name: optimization:constraints:propulsion:multirotor:propeller:rpm:climb
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:propeller:rpm:cruise
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:motor:torque:climb
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:motor:torque:hover
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:motor:torque:cruise
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:battery:power:takeoff
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:battery:power:climb
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:battery:power:cruise
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:battery:voltage:climb
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:battery:voltage:cruise
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:esc:power:climb
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:esc:power:cruise
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:esc:voltage:min
    lower: 0.0
  - name: optimization:constraints:propulsion:multirotor:esc:voltage:max
    lower: 0.0
  - name: optimization:constraints:mission:sizing:energy:multirotor
    lower: 0.0
  objective:
  - name: data:weight:mtow
    scaler: 0.1
